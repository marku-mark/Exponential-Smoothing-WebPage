<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exponential Smoothing Calculator</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────── -->
<div class="header">
  <div class="header-left">
    <h1>Exponential<br><span>Smoothing</span> Calculator</h1>
  </div>
  <div class="header-badge">SES · MSE · Chart</div>
</div>

<div class="main">

  <!-- ── Formula reference strip ─────────────────────────── -->
  <div class="formula-strip">
    <div class="formula-item">
      <span>SES Formula</span>
      <code>Fₜ = F_(t-1) + α(A_(t-1) − F_(t-1))</code>
    </div>
    <div class="formula-item">
      <span>MSE Formula</span>
      <code>MSE = (1/n) · Σ(Aₜ − Fₜ)²</code>
    </div>
  </div>

  <!-- ── Input panel ─────────────────────────────────────── -->
  <div class="input-panel">
    <div class="section-label">Input Parameters</div>

    <div class="input-grid">

      <!-- Actual data — full width row -->
      <div class="field data-field">
        <label>Actual values <em>(comma-separated)</em></label>
        <textarea id="dataInput"
          placeholder="e.g. 200, 240, 180, 220, 260, 210, 195, 230"></textarea>
      </div>

      <!-- Alpha -->
      <div class="field">
        <label>Smoothing constant <em>α (alpha)</em></label>
        <div class="alpha-wrap">
          <input type="range" id="alphaSlider"
            min="0.01" max="0.99" step="0.01" value="0.3"
            oninput="
              document.getElementById('alphaNum').value = parseFloat(this.value).toFixed(2);
              document.getElementById('alphaVal').textContent = parseFloat(this.value).toFixed(2);
            ">
          <span class="alpha-val" id="alphaVal">0.30</span>
        </div>
        <input type="number" id="alphaNum"
          min="0.01" max="0.99" step="0.01" value="0.30"
          placeholder="0.01 – 0.99"
          oninput="syncAlpha(this.value)">
      </div>

      <!-- Initial forecast -->
      <div class="field">
        <label>
          Initial forecast <em>F₁</em>
          <span style="color:var(--muted);font-size:0.8rem;">(optional)</span>
        </label>
        <input type="number" id="initForecast"
          placeholder="Defaults to first data point">
      </div>

      <!-- Decimal places -->
      <div class="field">
        <label>Decimal places <em>(display)</em></label>
        <input type="number" id="decimals"
          min="0" max="6" value="2" placeholder="2">
      </div>

    </div><!-- /input-grid -->

    <div class="btn-row">
      <button class="btn-calc" onclick="calculate()">Calculate →</button>
      <button class="btn-reset" onclick="resetAll()">Reset</button>
    </div>

    <div class="error-box" id="errorBox"></div>
  </div><!-- /input-panel -->

  <!-- ── Results ─────────────────────────────────────────── -->
  <div class="results" id="results">

    <!-- Metric cards -->
    <div class="metric-row" id="metricRow"></div>

    <!-- Chart -->
    <div class="chart-wrap">
      <div class="chart-header">
        <span class="chart-title">Actual vs Forecast</span>
        <div class="chart-legend">
          <span><span class="legend-dot actual"></span>Actual</span>
          <span><span class="legend-dot forecast"></span>Forecast</span>
          <span><span class="legend-dot next"></span>Next period</span>
        </div>
      </div>
      <div class="chart-canvas-wrap">
        <canvas id="sesChart"></canvas>
      </div>
    </div>

    <!-- Forecast table -->
    <div class="table-wrap">
      <div class="table-header">
        <span class="table-title">Forecast Table</span>
        <span id="tableInfo"
          style="font-family:'IBM Plex Mono',monospace;font-size:1rem;color:var(--muted);"></span>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Period</th>
              <th>Actual (Aₜ)</th>
              <th>Forecast (Fₜ)</th>
              <th>Error (A−F)</th>
              <th>Squared Error</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Footer summary -->
    <div class="footnote" id="footnote"></div>

  </div><!-- /results -->

</div><!-- /main -->

<!-- JavaScript -->
<script src="app.js"></script>
</body>
</html>
